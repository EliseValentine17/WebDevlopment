<h1>Date</h1>

<script>
  let now = new Date();
  console.log("NOW:"+now);

  let then = new Date("june, 19, 2026, 12:00:00");
  let diff = then - now;

  let days = (diff/ 1000 / 60 / 60 / 24);

  document.getElementById("output").innerHTML=days;



</script>
