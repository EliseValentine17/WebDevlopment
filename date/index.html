<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date</title>
</head>
<body>
<h1>Days Until Camp</h1>

<p> camp is in <span id="weeks"></span> weeks, <span id = "days"></span> days, <span id="hours"></span> hours, <span id="minutes">

</span> minutes and <span id="seconds"></span> seconds </p>
<!--<p>camp is in  </p>-->
</body>

<script>
 count()
    setInterval(count, 500);

    function count(){
  let now = new Date();
  console.log("NOW:" + now);

  let then = new Date("6/19/2026 10:00:00");
  let diff = then - now;

  let weeks= Math.floor(diff/(1000* 60 * 60 * 24* 7));
  let days = Math.floor(diff/(1000 * 60 * 60 * 24) ) %7;
let hours= Math.floor (diff/ (1000* 60* 60)) % 24;
let minutes = Math.floor (diff/ (1000 * 60)) % 24;
let seconds = Math.floor (diff/ (1000 )) % 60;

  document.getElementById("weeks").innerHTML=Math.floor(weeks);

  document.getElementById("days").innerHTML=days;
  document.getElementById("hours").innerHTML=hours;
  document.getElementById("minutes").innerHTML=minutes;
  document.getElementById("seconds").innerHTML=seconds;

        }


</script>
</html>
