<style>


    body {

<script>
    function setCookie(cname, cvalue, exdays) {
        const d = new Date();
        d.setTime(d.getTime() + (exdays*24*60*60*1000));
        let expires = "expires="+ d.toUTCString();
        document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
    }

    function getCookie(cname) {
        let name = cname + "=";
        let decodedCookie = decodeURIComponent(document.cookie);
        let ca = decodedCookie.split(';');
        for(let i = 0; i <ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') {
                c = c.substring(1);
            }
            if (c.indexOf(name) == 0) {
                return c.substring(name.length, c.length);
            }
        }
        return "";
    }

    function newTask(){
       let taskInput=document.getElementById("taskPlace");
        let taskName= taskInput.value

        if(taskName == ""){
            return false;
        }
        console.log(taskName);
        setCookie("taskPlace", getCookie("taskPlace") + "|" + taskName, 15);
        addTask(taskName);

    }

    function addTask(taskName) {


           let newDIV = document.createElement("div")
            newDIV.className = "taskPlace";
           document.getElementById("tasks").appendChild(newDIV);

           let checkbox = document.createElement("input");
           checkbox.type = "checkbox";
           newDIV.appendChild(checkbox);

           let NewSpan = document.createElement("span");
           NewSpan.setAttribute("taskName", "class");
           NewSpan.innerText = taskName;
           newDIV.appendChild(NewSpan);

           let destroy= document.createElement("span");
           destroy.className="delete"
          destroy.innerText= "delete"
          destroy.style.float = "right"
          destroy.addEventListener("click", deleteTask)
          newDIV.appendChild(destroy)

        let important= document.createElement("span");
        important.className="Star"
        important.innerText= "⭐"
        important.style.float = "left"
        important.addEventListener("click", importantTask)
        newDIV.appendChild(important)

            // setCookie("taskPlace",getCookie("taskPlace")+ "|" + taskName,15);



    taskPlace.value = "";
    taskPlace.focus()

       }

       function importantTask(){
        console.log("important");
           var element = document.getElementById("taskPlace");
           element.classList.add("important");
       }

        function deleteTask(e){
    console.log(e)
            e.target.parentElement.remove();
        }


    let currentCookie=getCookie("taskPlace");
    currentCookie=currentCookie.split("|");
    console.log(currentCookie);
    for(let i=0;i<currentCookie.length; i=i+1){
        addTask(currentCookie[i]);
    }

</script>
