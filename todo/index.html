<script>
    function setCookie(cname, cvalue, exdays) {
        const d = new Date();
        d.setTime(d.getTime() + (exdays*24*60*60*1000));
        let expires = "expires="+ d.toUTCString();
        document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
    }

    function getCookie(cname) {
        let name = cname + "=";
        let decodedCookie = decodeURIComponent(document.cookie);
        let ca = decodedCookie.split(';');
        for(let i = 0; i <ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') {
                c = c.substring(1);
            }
            if (c.indexOf(name) == 0) {
                return c.substring(name.length, c.length);
            }
        }
        return "";
    }
    function addTask(){
        if(taskPlace.value !=""){

            document.cookie=taskPlace.value;

           let taskName = document.getElementById("taskPlace").value;

           console.log(taskPlace);

           let newDIV = document.createElement("div")
           document.getElementById("tasks").appendChild(newDIV);

           let checkbox = document.createElement("input");
           checkbox.type = "checkbox";
           newDIV.appendChild(checkbox);

           let NewSpan = document.createElement("span");
           NewSpan.setAttribute("taskName", "class");
           NewSpan.innerText = taskName;
           newDIV.appendChild(NewSpan);

           let destroy= document.createElement("span");
           destroy.className="delete"
          destroy.innerText= "delete"
          destroy.style.float = "right"
          destroy.addEventListener("click", deleteTask)
          newDIV.appendChild(destroy)





    taskPlace.value = "";
    taskPlace.focus()

       }
